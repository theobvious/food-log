<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 9h16" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 2v3M14 2v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="5" y="12" width="2" height="2" rx="0.5" fill="currentColor"/>
          <rect x="9" y="12" width="2" height="2" rx="0.5" fill="currentColor"/>
        </svg>
        <h1 class="logo">Food Log</h1>
      </div>
      <div class="header-right">
        <div class="view-toggle" role="group" aria-label="View">
          <button class="toggle-btn active" data-view="log" aria-pressed="true">Log</button>
          <button class="toggle-btn" data-view="calendar" aria-pressed="false">Calendar</button>
        </div>
        <div id="user-chip" class="user-chip hidden" aria-label="Signed-in user">
          <img id="user-avatar" class="user-avatar" alt="" width="24" height="24">
          <span id="user-name" class="user-name"></span>
          <button id="sign-out-btn" class="sign-out-btn" aria-label="Sign out">Sign out</button>
        </div>
      </div>
    </header>

    <!-- Auth screen (shown when signed out) -->
    <div id="auth-screen" class="auth-screen" aria-label="Sign in">
      <div class="auth-card">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
          <rect x="3" y="8" width="30" height="24" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M3 16h30" stroke="currentColor" stroke-width="2"/>
          <path d="M10 4v4M26 4v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <rect x="9" y="21" width="3" height="3" rx="0.5" fill="currentColor"/>
          <rect x="16" y="21" width="3" height="3" rx="0.5" fill="currentColor"/>
          <rect x="9" y="27" width="3" height="3" rx="0.5" fill="currentColor"/>
          <rect x="16" y="27" width="3" height="3" rx="0.5" fill="currentColor"/>
        </svg>
        <h2 class="auth-title">Food Log</h2>
        <p class="auth-desc">Sign in to save your entries across devices and sessions.</p>
        <button id="sign-in-btn" class="btn-primary btn-signin">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="currentColor" opacity=".8"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="currentColor" opacity=".6"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="currentColor" opacity=".4"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="currentColor" opacity=".9"/>
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- Log View -->
    <main id="view-log" class="view">

      <section class="add-form" aria-label="Add food entry">
        <div class="form-row">
          <input type="text" id="qty" placeholder="Quantity" class="input input-qty" aria-label="Quantity">
          <div class="select-wrap">
            <select id="qualifier" class="input input-qualifier" aria-label="Qualifier">
              <option value="">— Qualifier —</option>
              <option value="sugar-free">Sugar-free</option>
              <option value="gluten-free">Gluten-free</option>
              <option value="whole-grain">Whole grain</option>
              <option value="spelt">Spelt</option>
            </select>
            <svg class="select-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="autocomplete-wrap">
            <input type="text" id="food-name" placeholder="Food name" class="input input-name" autocomplete="off" aria-label="Food name" aria-autocomplete="list" aria-controls="suggestions">
            <ul id="suggestions" class="suggestions hidden" role="listbox" aria-label="Food suggestions"></ul>
          </div>
          <input type="number" id="kcal" placeholder="kcal" class="input input-kcal" aria-label="Calories" min="0">
          <button id="add-btn" class="btn-primary" aria-label="Add entry">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Add
          </button>
        </div>
      </section>

      <section id="entries-list" class="entries-list" aria-label="Food entries"></section>

    </main>

    <!-- Calendar View -->
    <main id="view-calendar" class="view hidden" aria-label="Calendar view">

      <div class="calendar">
        <div class="cal-header">
          <button id="prev-month" class="cal-nav" aria-label="Previous month">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span id="cal-month-label" class="cal-month" aria-live="polite"></span>
          <button id="next-month" class="cal-nav" aria-label="Next month">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="cal-weekdays" aria-hidden="true">
          <span>Mon</span><span>Tue</span><span>Wed</span>
          <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div id="cal-grid" class="cal-grid" role="grid"></div>
      </div>

      <section id="cal-add-section" class="add-form cal-add-section hidden" aria-label="Add entry for selected day">
        <div class="for-date-label">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M6 1v5l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Adding for <strong id="cal-for-date"></strong>
        </div>
        <div class="form-row">
          <input type="text" id="cal-qty" placeholder="Quantity" class="input input-qty" aria-label="Quantity">
          <div class="select-wrap">
            <select id="cal-qualifier" class="input input-qualifier" aria-label="Qualifier">
              <option value="">— Qualifier —</option>
              <option value="sugar-free">Sugar-free</option>
              <option value="gluten-free">Gluten-free</option>
              <option value="whole-grain">Whole grain</option>
              <option value="spelt">Spelt</option>
            </select>
            <svg class="select-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="autocomplete-wrap">
            <input type="text" id="cal-food-name" placeholder="Food name" class="input input-name" autocomplete="off" aria-label="Food name" aria-autocomplete="list" aria-controls="cal-suggestions">
            <ul id="cal-suggestions" class="suggestions hidden" role="listbox" aria-label="Food suggestions"></ul>
          </div>
          <input type="number" id="cal-kcal" placeholder="kcal" class="input input-kcal" aria-label="Calories" min="0">
          <button id="cal-add-btn" class="btn-primary" aria-label="Add entry">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Add
          </button>
        </div>
      </section>

      <section id="cal-entries" class="entries-list cal-entries" aria-label="Entries for selected day"></section>

    </main>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
